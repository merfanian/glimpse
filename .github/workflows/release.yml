name: Release

# Builds installable packages for Chrome, Edge, and Firefox, publishes them to a
# GitHub Release, and (when the relevant store secrets are configured) uploads the
# latest version to the Chrome Web Store, Microsoft Edge Add-ons, and Firefox AMO.
#
# Trigger a release by pushing a version tag, e.g.:
#   npm version 0.2.0 --no-git-tag-version   # optional: keep package.json in sync
#   git tag v0.2.0 && git push origin v0.2.0
#
# The packaged extension version is taken from the tag (vX.Y.Z) so it always matches
# the release. Manual runs (workflow_dispatch) build artifacts without publishing.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      publish_chrome: ${{ steps.flags.outputs.chrome }}
      publish_edge: ${{ steps.flags.outputs.edge }}
      publish_firefox: ${{ steps.flags.outputs.firefox }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect configured stores
        id: flags
        env:
          CHROME: ${{ secrets.CHROME_EXTENSION_ID }}
          EDGE: ${{ secrets.EDGE_PRODUCT_ID }}
          FIREFOX: ${{ secrets.FIREFOX_JWT_ISSUER }}
        run: |
          is_tag=${{ startsWith(github.ref, 'refs/tags/') }}
          emit() { [[ "$is_tag" == "true" && -n "$2" ]] && echo "$1=true" >> "$GITHUB_OUTPUT" || echo "$1=false" >> "$GITHUB_OUTPUT"; }
          emit chrome "$CHROME"
          emit edge "$EDGE"
          emit firefox "$FIREFOX"

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Derive version
        id: meta
        run: |
          REF="${GITHUB_REF#refs/tags/}"
          if [[ "$REF" == v* ]]; then
            VERSION="${REF#v}"
          else
            VERSION="$(node -p "require('./package.json').version")"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version $VERSION"

      - name: Sync package.json version
        run: npm version "${{ steps.meta.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build Chrome + Firefox
        run: |
          npm run build:chrome
          npm run build:firefox

      - name: Assemble Edge package (Chromium build)
        run: cp -r dist/chrome dist/edge

      - name: Zip packages
        run: |
          for target in chrome edge firefox; do
            (cd "dist/$target" && zip -r -q "../../glimpse-$target.zip" .)
          done
          ls -l glimpse-*.zip

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: glimpse-packages
          path: glimpse-*.zip
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: glimpse-*.zip
          generate_release_notes: true

  publish-chrome:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.publish_chrome == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: glimpse-packages

      - name: Upload to Chrome Web Store
        uses: mnao305/chrome-extension-upload@v5.0.0
        with:
          file-path: glimpse-chrome.zip
          extension-id: ${{ secrets.CHROME_EXTENSION_ID }}
          client-id: ${{ secrets.CHROME_CLIENT_ID }}
          client-secret: ${{ secrets.CHROME_CLIENT_SECRET }}
          refresh-token: ${{ secrets.CHROME_REFRESH_TOKEN }}
          publish: true

  publish-edge:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.publish_edge == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: glimpse-packages

      - name: Upload to Edge Add-ons
        uses: wdzeng/edge-addon@v2
        with:
          product-id: ${{ secrets.EDGE_PRODUCT_ID }}
          zip-path: glimpse-edge.zip
          client-id: ${{ secrets.EDGE_CLIENT_ID }}
          api-key: ${{ secrets.EDGE_API_KEY }}

  publish-firefox:
    needs: build
    runs-on: ubuntu-latest
    if: needs.build.outputs.publish_firefox == 'true'
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: glimpse-packages

      - name: Sign & upload to Firefox AMO
        uses: wdzeng/firefox-addon@v1
        with:
          addon-guid: glimpse@merfanian.github.io
          xpi-path: glimpse-firefox.zip
          jwt-issuer: ${{ secrets.FIREFOX_JWT_ISSUER }}
          jwt-secret: ${{ secrets.FIREFOX_JWT_SECRET }}
