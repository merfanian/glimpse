<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Glimpse — PDF</title>
    <link rel="stylesheet" href="pdf_viewer.css" />
    <link rel="stylesheet" href="viewer.css" />
    <link rel="stylesheet" href="tooltip.css" />
  </head>
  <body>
    <div id="toolbar">
      <div class="tb-left">
        <img id="tb-logo" src="icons/icon-48.png" width="22" height="22" alt="" />
        <span id="doc-title">Glimpse</span>
      </div>
      <div class="tb-center">
        <!-- Page navigation -->
        <button class="tb-btn" id="btn-prev" title="Previous page (←)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="tb-page-info">
          <input id="page-num" type="number" min="1" value="1" title="Current page" />
          <span class="tb-sep">/</span>
          <span id="page-count">—</span>
        </div>
        <button class="tb-btn" id="btn-next" title="Next page (→)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
        <div class="tb-divider"></div>
        <!-- Zoom controls -->
        <button class="tb-btn" id="btn-zoom-out" title="Zoom out (Ctrl+−)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <select id="zoom-select" title="Zoom level">
          <option value="page-width">Page width</option>
          <option value="page-fit">Page fit</option>
          <option value="auto">Automatic</option>
          <option disabled>──────────</option>
          <option value="0.5">50%</option>
          <option value="0.75">75%</option>
          <option value="1">100%</option>
          <option value="1.25">125%</option>
          <option value="1.5">150%</option>
          <option value="2">200%</option>
          <option value="3">300%</option>
        </select>
        <button class="tb-btn" id="btn-zoom-in" title="Zoom in (Ctrl++)">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
      </div>
      <div class="tb-right">
        <span id="status"></span>
      </div>
    </div>
    <div id="viewerContainer">
      <div id="viewer" class="pdfViewer"></div>
    </div>
    <!-- Shown when browser blocks direct access to a local file:// PDF -->
    <div id="file-picker-overlay" class="hidden">
      <div id="file-picker-card">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
        </svg>
        <h2>Open local PDF</h2>
        <p id="file-picker-hint"></p>
        <label id="file-picker-label" for="file-input">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Choose file…
        </label>
        <input type="file" id="file-input" accept=".pdf,application/pdf" />
      </div>
    </div>
    <script src="viewer.js"></script>
  </body>
</html>
