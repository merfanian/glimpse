<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Glimpse logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#1F6FEB"/>
    </linearGradient>
    <linearGradient id="lens" x1="150" y1="150" x2="360" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#BFDBFE" stop-opacity="0.25"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#0B3A8C" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Rounded app tile -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>

  <!-- Document / paper being previewed -->
  <g filter="url(#soft)">
    <rect x="150" y="120" width="212" height="272" rx="24" fill="#FFFFFF"/>
    <!-- folded corner -->
    <path d="M312 120 L362 170 L312 170 Z" fill="#DCE7FB"/>
    <!-- text lines -->
    <rect x="186" y="172" width="120" height="16" rx="8" fill="#9DB8E8"/>
    <rect x="186" y="208" width="140" height="16" rx="8" fill="#C5D6F4"/>
    <rect x="186" y="244" width="96"  height="16" rx="8" fill="#C5D6F4"/>
    <rect x="186" y="280" width="132" height="16" rx="8" fill="#C5D6F4"/>
  </g>

  <!-- Magnifying glass "glimpsing" the citation -->
  <g filter="url(#soft)">
    <circle cx="262" cy="266" r="96" fill="url(#lens)" stroke="#FFFFFF" stroke-width="22"/>
    <circle cx="262" cy="266" r="96" fill="none" stroke="#1B5FD0" stroke-width="6" stroke-opacity="0.35"/>
    <!-- highlighted citation line inside the lens -->
    <rect x="214" y="258" width="96" height="18" rx="9" fill="#1F6FEB"/>
    <!-- handle -->
    <rect x="320" y="324" width="118" height="40" rx="20" transform="rotate(45 320 324)" fill="#FFFFFF"/>
    <rect x="326" y="332" width="104" height="24" rx="12" transform="rotate(45 326 332)" fill="#DCE7FB"/>
  </g>
</svg>
